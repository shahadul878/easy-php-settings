name: Deploy to WordPress.org

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install SVN
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion
          svn --version

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"* %s" --reverse)
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"* %s" --reverse)
          fi

          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update readme.txt
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"

          sed -i "s/Stable tag: .*/Stable tag: ${VERSION}/" readme.txt

          DATE=$(date +"%B %d, %Y")

          if grep -q "== Changelog ==" readme.txt; then
            sed -i "/== Changelog ==/a\\
            \\
            = ${VERSION} =\\
            Released: ${DATE}\\
            \\
            ${CHANGELOG}\\
            " readme.txt
          else
            echo "" >> readme.txt
            echo "== Changelog ==" >> readme.txt
            echo "" >> readme.txt
            echo "= ${VERSION} =" >> readme.txt
            echo "Released: ${DATE}" >> readme.txt
            echo "" >> readme.txt
            echo "${CHANGELOG}" >> readme.txt
          fi

      - name: Update plugin version
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -i "s/Version:     [0-9.]*/Version:     ${VERSION}/" class-easy-php-settings.php

      - name: Create deployment package
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PLUGIN_SLUG="easy-php-settings"

          mkdir -p /tmp/${PLUGIN_SLUG}

          rsync -av --exclude-from=.distignore \
            ./ /tmp/${PLUGIN_SLUG}/

          cd /tmp
          zip -r ${PLUGIN_SLUG}.zip ${PLUGIN_SLUG}/
          mv ${PLUGIN_SLUG}.zip ${{ github.workspace }}/

      - name: Verify SVN credentials
        run: |
          if [ -z "${{ secrets.WPORG_USERNAME }}" ] || [ -z "${{ secrets.WPORG_PASSWORD }}" ]; then
            echo "❌ Error: WPORG_USERNAME or WPORG_PASSWORD secrets are not set"
            echo "Please configure these secrets in GitHub: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ SVN credentials configured"

      - name: Checkout WordPress.org SVN
        run: |
          echo "Checking out WordPress.org SVN repository..."
          svn checkout https://plugins.svn.wordpress.org/easy-php-settings/ /tmp/svn \
            --username ${{ secrets.WPORG_USERNAME }} \
            --password ${{ secrets.WPORG_PASSWORD }} \
            --depth immediates \
            --no-auth-cache \
            --non-interactive

          echo "Updating trunk..."
          svn update --set-depth infinity /tmp/svn/trunk \
            --username ${{ secrets.WPORG_USERNAME }} \
            --password ${{ secrets.WPORG_PASSWORD }} \
            --no-auth-cache \
            --non-interactive

          echo "Updating assets..."
          svn update --set-depth infinity /tmp/svn/assets \
            --username ${{ secrets.WPORG_USERNAME }} \
            --password ${{ secrets.WPORG_PASSWORD }} \
            --no-auth-cache \
            --non-interactive

          echo "Updating tags directory..."
          svn update --set-depth infinity /tmp/svn/tags/${{ steps.get_version.outputs.version }} \
            --username ${{ secrets.WPORG_USERNAME }} \
            --password ${{ secrets.WPORG_PASSWORD }} \
            --no-auth-cache \
            --non-interactive || echo "Tag directory doesn't exist yet (will be created)"

      - name: Deploy to SVN trunk
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PLUGIN_SLUG="easy-php-settings"

          rm -rf /tmp/svn/trunk/*

          rsync -av --exclude-from=.distignore \
            ${{ github.workspace }}/ /tmp/svn/trunk/

          cd /tmp/svn

          svn add --force trunk/*

          svn status | grep '^!' | awk '{print $2}' | xargs -r svn rm

          echo "Committing changes to trunk..."
          svn commit -m "Update trunk to version ${VERSION}" \
            --username ${{ secrets.WPORG_USERNAME }} \
            --password ${{ secrets.WPORG_PASSWORD }} \
            --no-auth-cache \
            --non-interactive

          if [ $? -eq 0 ]; then
            echo "✅ Successfully committed to trunk"
          else
            echo "❌ Failed to commit to trunk"
            exit 1
          fi

      - name: Deploy assets to SVN
        run: |
          if [ -d ".wordpress-org" ]; then
            echo "Deploying assets from .wordpress-org/ ..."
            mkdir -p /tmp/svn/assets

            rsync -av --delete \
              --exclude='README.md' \
              .wordpress-org/ /tmp/svn/assets/

            cd /tmp/svn

            svn add --force assets/* 2>/dev/null || true
            svn status assets/ | grep '^!' | awk '{print $2}' | xargs -r svn rm

            if svn status assets/ | grep -q '[ADMRC]'; then
              echo "Committing asset changes..."
              svn commit -m "Update assets for version ${{ steps.get_version.outputs.version }}" \
                --username ${{ secrets.WPORG_USERNAME }} \
                --password ${{ secrets.WPORG_PASSWORD }} \
                --no-auth-cache \
                --non-interactive
              echo "✅ Assets deployed"
            else
              echo "ℹ️ No asset changes to commit"
            fi
          else
            echo "⚠️ No .wordpress-org/ directory found, skipping asset deployment"
          fi

      - name: Create SVN tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          cd /tmp/svn

          if [ -d "tags/${VERSION}" ]; then
            echo "Removing existing tag ${VERSION}..."
            svn rm tags/${VERSION} \
              --username ${{ secrets.WPORG_USERNAME }} \
              --password ${{ secrets.WPORG_PASSWORD }} \
              --no-auth-cache \
              --non-interactive
            svn commit -m "Remove existing tag ${VERSION}" \
              --username ${{ secrets.WPORG_USERNAME }} \
              --password ${{ secrets.WPORG_PASSWORD }} \
              --no-auth-cache \
              --non-interactive
          fi

          echo "Creating tag ${VERSION}..."
          svn cp trunk tags/${VERSION} \
            --username ${{ secrets.WPORG_USERNAME }} \
            --password ${{ secrets.WPORG_PASSWORD }} \
            --no-auth-cache \
            --non-interactive

          echo "Committing tag ${VERSION}..."
          svn commit -m "Tag version ${VERSION}" \
            --username ${{ secrets.WPORG_USERNAME }} \
            --password ${{ secrets.WPORG_PASSWORD }} \
            --no-auth-cache \
            --non-interactive

          if [ $? -eq 0 ]; then
            echo "✅ Successfully created and committed tag ${VERSION}"
          else
            echo "❌ Failed to commit tag"
            exit 1
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: easy-php-settings.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: easy-php-settings.zip
          body: |
            ## Version ${{ steps.get_version.outputs.version }}

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
